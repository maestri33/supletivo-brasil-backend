    image: supletivo/address:${TAG:-latest}
    restart: always
    env_file: .env
    environment:
      DATABASE_SCHEMA: address
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    deploy:
      resources: { limits: { memory: 256M }, reservations: { memory: 128M } }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
