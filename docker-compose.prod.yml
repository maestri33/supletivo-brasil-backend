  # -- Observabilidade (Prometheus + Loki + Grafana) --

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9090/-/healthy", "-O", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources: { limits: { memory: 1G }, reservations: { memory: 512M } }
    logging:
      driver: "json-file"
      options: { max-size: "25m", max-file: "3" }

  loki:
    image: grafana/loki:3.0.0
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3100/ready", "-O", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources: { limits: { memory: 1G }, reservations: { memory: 512M } }
    logging:
      driver: "json-file"
      options: { max-size: "25m", max-file: "3" }

  grafana:
    image: grafana/grafana:11.0.0
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    depends_on:
      prometheus: { condition: service_healthy }
      loki: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3000/api/health", "-O", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources: { limits: { memory: 512M }, reservations: { memory: 256M } }
    logging:
      driver: "json-file"
      options: { max-size: "25m", max-file: "3" }

  # -- Secret manager (Infisical) --
  # Ativar com: --profile infisical

  infisical-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${INFISICAL_PG_PASSWORD:?INFISICAL_PG_PASSWORD required}
    volumes:
      - infisical_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infisical"]
    deploy:
      resources: { limits: { memory: 512M }, reservations: { memory: 256M } }
    logging:
      driver: "json-file"
      options: { max-size: "25m", max-file: "3" }

  infisical:
    image: infisical/infisical:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_CONNECTION_URI: postgresql://infisical:***@infisical-db:5432/infisical
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:?INFISICAL_AUTH_SECRET required}
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:?INFISICAL_ENCRYPTION_KEY required}
      SITE_URL: http://localhost:8080
      TELEMETRY_ENABLED: false
    depends_on:
      infisical-db: { condition: service_healthy }
    profiles: ["infisical"]
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:8080/api/status", "-O", "/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources: { limits: { memory: 1G }, reservations: { memory: 512M } }
    logging:
      driver: "json-file"
      options: { max-size: "25m", max-file: "3" }

  # -- Log shipping (Promtail → Loki) --

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./promtail:/promtail:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/promtail/promtail-config.yml"]
    depends_on:
      loki: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9080/ready", "-O", "/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits: { memory: 128M }
        reservations: { memory: 64M }
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "2" }

volumes:
  acme_data:
  pgdata:
  prometheus_data:
  loki_data:
  grafana_data:
  infisical_pgdata:
