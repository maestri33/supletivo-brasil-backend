# =============================================================================
# docker-compose.prod.yml — Ambiente de produção Supletivo
# =============================================================================
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml ps
#
# DIFERENÇAS da versão dev:
#   - Sem bind-mount (imagens construídas via Dockerfile)
#   - Restart: always (auto-recuperação)
#   - Secrets via variáveis de ambiente (.env ou Infisical)
#   - Log json-file com rotação para Loki
#   - Resource limits
#   - Init script para schemas PostgreSQL
#
# Antes de usar:
#   1. cp .env.example.prod .env && edite as senhas
#   2. docker compose -f docker-compose.prod.yml build
#   3. docker compose -f docker-compose.prod.yml up -d
# =============================================================================

name: supletivo-prod

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    environment:
      POSTGRES_DB: supletivo
      POSTGRES_USER: supletivo
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supletivo -d supletivo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources: { limits: { memory: 2G }, reservations: { memory: 1G } }
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "3" }

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources: { limits: { memory: 512M }, reservations: { memory: 256M } }
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "3" }

  # -- API Gateway (Traefik) --
  # Roteamento público em https://api.supletivo.net/<service>/...
  # TLS automático via Let's Encrypt (TLS-ALPN-01 — requer portas 80/443 abertas).
  # Dashboard NÃO exposto publicamente; use SSH tunnel + `docker exec` se precisar.
  # Requer: ACME_EMAIL no .env.

  traefik:
    image: traefik:v2.11
    restart: always
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:?ACME_EMAIL required}"
      - "--certificatesresolvers.le.acme.storage=/acme/acme.json"
      - "--accesslog=true"
      - "--log.level=INFO"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme_data:/acme
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources: { limits: { memory: 256M }, reservations: { memory: 128M } }
    logging:
      driver: "json-file"
      options: { max-size: "25m", max-file: "3" }

  # Template YAML para serviços (expandido via script de build)
  # Cada serviço: image: supletivo/<nome>:${TAG:-latest}
  # Portas: apenas serviços com API externa expõem porta
  # Variáveis comuns injetadas via env_file compartilhado

  address:
    image: supletivo/address:${TAG:-latest}
    restart: always
    env_file: .env
    environment:
      DATABASE_SCHEMA: address
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    deploy:
      resources: { limits: { memory: 256M }, reservations: { memory: 128M } }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options: { max-size: "25m", max-file: "3" }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.address.rule=Host(`api.supletivo.net`) && PathPrefix(`/address`)"
      - "traefik.http.routers.address.entrypoints=websecure"
      - "traefik.http.routers.address.tls=true"
      - "traefik.http.routers.address.tls.certresolver=le"
      - "traefik.http.services.address.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.address-strip.stripprefix.prefixes=/address"
      - "traefik.http.routers.address.middlewares=address-strip"

