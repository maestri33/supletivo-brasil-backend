      - "traefik.http.routers.asaas.middlewares=asaas-strip"
      # Router externo (api.m33.live/asaas/*) — gateways de pagamento entram aqui.
      # Reusa o mesmo middleware asaas-strip e o mesmo service asaas:8000.
      # Padrão genérico: cada gateway = /<nome>/* em api.m33.live.
      - "traefik.http.routers.asaas-m33.rule=Host(`api.m33.live`) && PathPrefix(`/asaas`)"
      - "traefik.http.routers.asaas-m33.entrypoints=websecure"
      - "traefik.http.routers.asaas-m33.tls=true"
      - "traefik.http.routers.asaas-m33.tls.certresolver=le"
      - "traefik.http.routers.asaas-m33.service=asaas"
      - "traefik.http.routers.asaas-m33.middlewares=asaas-strip"

