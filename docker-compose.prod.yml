# =============================================================================
# docker-compose.prod.yml — Ambiente de produção Supletivo
# =============================================================================
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml ps
#
# DIFERENÇAS da versão dev:
#   - Sem bind-mount (imagens construídas via Dockerfile)
#   - Restart: always (auto-recuperação)
#   - Secrets via variáveis de ambiente (.env ou Infisical)
#   - Log json-file com rotação para Loki
#   - Resource limits
#   - Init script para schemas PostgreSQL
#
# Antes de usar:
#   1. cp .env.example.prod .env && edite as senhas
#   2. docker compose -f docker-compose.prod.yml build
#   3. docker compose -f docker-compose.prod.yml up -d
# =============================================================================

name: supletivo-prod

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    environment:
      POSTGRES_DB: supletivo
      POSTGRES_USER: supletivo
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supletivo -d supletivo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources: { limits: { memory: 2G }, reservations: { memory: 1G } }
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "3" }

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources: { limits: { memory: 512M }, reservations: { memory: 256M } }
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "3" }

  # Template YAML para serviços (expandido via script de build)
  # Cada serviço: image: supletivo/<nome>:${TAG:-latest}
