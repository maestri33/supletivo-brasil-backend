# =============================================================================
# alert-rules.yml — Prometheus alerting rules for Supletivo
# =============================================================================
# Rules are grouped by category.
# =============================================================================

groups:

  - name: supletivo_health
    interval: 15s
    rules:

      # ── Health flapping ──
      # Triggers when up == 0 for 3 consecutive evaluations (45s)
      - alert: ServiceDown
        expr: up == 0
        for: 45s
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is DOWN"
          description: "{{ $labels.job }} has been unreachable for over 45 seconds."
          runbook_url: "https://wiki.internal/supletivo/on-call"

      # ── Health flapping recovery ──
      # Flapping = alternating up/down rapidly
      - alert: ServiceFlapping
        expr: changes(up[5m]) > 3
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} is FLAPPING"
          description: "{{ $labels.job }} changed state {{ $value }} times in the last 5 minutes."

      # ── Prolonged down (10+ min) ──
      # Escalation: if still down after 10 minutes, page
      - alert: ServiceProlongedDown
        expr: up == 0
        for: 10m
        labels:
          severity: critical
          escalation: true
        annotations:
          summary: "{{ $labels.job }} DOWN for 10+ minutes"
          description: "{{ $labels.job }} has been unreachable for over 10 minutes. Requires immediate intervention."

  - name: supletivo_resource
    interval: 1m
    rules:

      # ── Absent metric (no data) ──
      - alert: ServiceAbsent
        expr: absent(up{job=~".+"})
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Metric data missing"
          description: "No up metric data received for any service in 5 minutes. Possible Prometheus config issue."

  - name: supletivo_errors
    interval: 1m
    rules:

      # ── High error rate ──
      # Error rate > 1% over 5 minutes
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total[5m])) by (job)
            * 100
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} error rate > 1%"
          description: "{{ $labels.job }} has {{ $value | humanizePercentage }} error rate over 5 minutes."
