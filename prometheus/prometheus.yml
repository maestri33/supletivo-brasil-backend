# =============================================================================
# prometheus.yml — Scrape config for Supletivo microservices
# =============================================================================
# Auto-generated. All 22 microservices + prometheus itself.
# Each service exposes /metrics on the container's port 8000.
# The docker DNS resolves service names to container IPs.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "address"
    static_configs:
      - targets: ["address:8000"]

  - job_name: "ai"
    static_configs:
      - targets: ["ai:8000"]

  - job_name: "asaas"
    static_configs:
      - targets: ["asaas:8000"]

