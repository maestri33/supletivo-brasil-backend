# =============================================================================
# promtail-config.yml — Promtail log shipping config for Supletivo
# =============================================================================
# Ships Docker json-file logs → Loki.
# Runs alongside docker-compose, reads /var/lib/docker/containers/*/*.log
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values:
              - com.docker.compose.project=supletivo-dev
              - com.docker.compose.project=supletivo-prod
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'service'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      # Include all labels as structured metadata
      - action: labelmap
        regex: '__meta_docker_container_label_(.+)'
      # Drop noisy internal labels
      - action: labeldrop
        regex: '__meta_docker_container_name|__meta_docker_container_id'

  # Fallback: scrape all docker containers if label filter fails
  - job_name: docker_all
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'service'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - action: labelmap
        regex: '__meta_docker_container_label_(.+)'
      - action: labeldrop
        regex: '__meta_docker_container_name|__meta_docker_container_id'
