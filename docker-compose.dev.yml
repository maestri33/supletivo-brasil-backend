  # -- Observabilidade (Grafana + Loki + Prometheus) --
  # Sprint 3 (§7 Q4): self-hosted stack

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9090/-/healthy", "-O", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3101:3100"
      - "9097:9096"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3100/ready", "-O", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3000/api/health", "-O", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -- Log shipping (Promtail → Loki) --

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./promtail:/promtail:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - "-config.file=/promtail/promtail-config.yml"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9080/ready", "-O", "/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # -- Secret manager (Infisical, §7 Q3) --

  infisical-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: infisical_dev
    volumes:
      - infisical_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infisical"]

  infisical:
    image: infisical/infisical:latest
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_CONNECTION_URI: "postgresql://infisical:***@infisical-db:5432/infisical"
      AUTH_SECRET: "72d2111d72d33b57a5c48e430c65a0aa55d26edaa990a15d805d4eb0d8406181"
      ENCRYPTION_KEY: "516c259954b28524af8e961159556d57dee53136c64cfdf85a3845fc511bbf49"
      SITE_URL: "http://localhost:8080"
      TELEMETRY_ENABLED: "false"
    depends_on:
      infisical-db:
        condition: service_healthy
    profiles: ["infisical"]
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:8080/api/status", "-O", "/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  prometheus_data:
  loki_data:
  grafana_data:
  infisical_pgdata: