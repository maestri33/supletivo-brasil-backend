# =============================================================================
# docker-compose.dev.yml — Ambiente de desenvolvimento completo
# =============================================================================
# Uso:
#   docker compose -f docker-compose.dev.yml up -d           # tudo
#   docker compose -f docker-compose.dev.yml up -d <servico> # um só
#   docker compose -f docker-compose.dev.yml ps               # status
#   docker compose -f docker-compose.dev.yml down             # derruba tudo
#
# Serviços: 20 microsserviços + postgres + redis
# =============================================================================

services:

  # -- Infraestrutura compartilhada --

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: supletivo
      POSTGRES_USER: supletivo
      POSTGRES_PASSWORD: supletivo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supletivo -d supletivo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- Microsserviços (1 container por serviço, porta interna 8000) --

  address:
    build:
      context: ./address
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://supletivo:supletivo_dev@postgres:5432/supletivo
      DATABASE_SCHEMA: address
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./address/.env.example
    depends_on:
      postgres:
        condition: service_healthy

  ai:
    build:
      context: ./ai
    ports:
      - "8002:8000"
    environment:
      DATABASE_SCHEMA: ai
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./ai/.env.example
    depends_on: {}

  asaas:
    build:
      context: ./asaas
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://supletivo:supletivo_dev@postgres:5432/supletivo
      DATABASE_SCHEMA: asaas
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./asaas/.env.example
    depends_on:
      postgres:
        condition: service_healthy

  auth:
    build:
      context: ./auth
    ports:
      - "8004:8000"
