      DATABASE_URL: postgresql+asyncpg://supletivo:supletivo_dev@postgres:5432/supletivo
      DATABASE_SCHEMA: auth
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./auth/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

