# =============================================================================
# provisioning/datasources/datasources.yml — Grafana datasource auto-provisioning
# =============================================================================
# Grafana loads these on startup. No manual datasource config needed.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
