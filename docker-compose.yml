      DB_SCHEMA: auth                    # Settings legacy — leitor atual.
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`api.m33.live`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.auth-strip.stripprefix.prefixes=/auth"
      - "traefik.http.routers.auth.middlewares=auth-strip"

  candidate:
    build:
      context: ./candidate
    ports:
      - "8005:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: candidate
      HUB_DEFAULT: "00000000-0000-0000-0000-000000000000"
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.candidate.rule=Host(`api.m33.live`) && PathPrefix(`/candidate`)"
      - "traefik.http.routers.candidate.entrypoints=web"
      - "traefik.http.services.candidate.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.candidate-strip.stripprefix.prefixes=/candidate"
      - "traefik.http.routers.candidate.middlewares=candidate-strip"

  commissions:
    build:
      context: ./commissions
    ports:
      - "8006:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: commissions
      PROMOTER_COMMISSION_CENTS: "500"
      COORDINATOR_COMMISSION_CENTS: "50"
      BONUS_THRESHOLD_COUNT: "10"
      BONUS_COMISSION_CENTS: "1000"
      PROCESSING_CRON_HOUR: "18"
      PROCESSING_CRON_TIMEZONE: America/Sao_Paulo
      COMMISSIONS_WEBHOOK_TOKEN: dev-token-change-in-prod
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.commissions.rule=Host(`api.m33.live`) && PathPrefix(`/commissions`)"
      - "traefik.http.routers.commissions.entrypoints=web"
      - "traefik.http.services.commissions.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.commissions-strip.stripprefix.prefixes=/commissions"
      - "traefik.http.routers.commissions.middlewares=commissions-strip"

  coordinator:
    build:
      context: ./coordinator
    ports:
      - "8007:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: coordinator
      COORDINATOR_COMMISSION_CENTS: "50"
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coordinator.rule=Host(`api.m33.live`) && PathPrefix(`/coordinator`)"
      - "traefik.http.routers.coordinator.entrypoints=web"
      - "traefik.http.services.coordinator.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.coordinator-strip.stripprefix.prefixes=/coordinator"
      - "traefik.http.routers.coordinator.middlewares=coordinator-strip"

  documents:
    build:
      context: ./documents
    ports:
      - "8008:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: documents
      MEDIA_ROOT: /data/media
      MAX_UPLOAD_MB: "10"
      DEBUG: "false"
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.documents.rule=Host(`api.m33.live`) && PathPrefix(`/documents`)"
      - "traefik.http.routers.documents.entrypoints=web"
      - "traefik.http.services.documents.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.documents-strip.stripprefix.prefixes=/documents"
      - "traefik.http.routers.documents.middlewares=documents-strip"

  enrollment:
    build:
      context: ./enrollment
    ports:
      - "8009:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: enrollment
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.enrollment.rule=Host(`api.m33.live`) && PathPrefix(`/enrollment`)"
      - "traefik.http.routers.enrollment.entrypoints=web"
      - "traefik.http.services.enrollment.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.enrollment-strip.stripprefix.prefixes=/enrollment"
      - "traefik.http.routers.enrollment.middlewares=enrollment-strip"

  fees:
    build:
      context: ./fees
    ports:
      - "8010:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: fees
      COORDINATOR_ROLE: coordinator
      FEE_DESCRIPTION_DEFAULT: "Taxa de matrícula"
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fees.rule=Host(`api.m33.live`) && PathPrefix(`/fees`)"
      - "traefik.http.routers.fees.entrypoints=web"
      - "traefik.http.services.fees.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.fees-strip.stripprefix.prefixes=/fees"
      - "traefik.http.routers.fees.middlewares=fees-strip"

  hub:
    build:
      context: ./hub
    ports:
      - "8011:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: hub
      STAFF_ROLES: '["admin","staff"]'
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub.rule=Host(`api.m33.live`) && PathPrefix(`/hub`)"
      - "traefik.http.routers.hub.entrypoints=web"
      - "traefik.http.services.hub.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.hub-strip.stripprefix.prefixes=/hub"
      - "traefik.http.routers.hub.middlewares=hub-strip"

  infinitepay:
    build:
      context: ./infinitepay
    ports:
      - "8012:8000"
    env_file: .env                       # ← INFINITEPAY_*, WEBHOOK_ENCRYPTION_KEY, INTERNAL_API_KEY
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: infinitepay
      # O anchor *service-urls injeta INFINITEPAY_BASE_URL=http://infinitepay:8000
      # (DNS interno) para outros serviços CLIENTES. Mas o próprio app infinitepay
      # USA essa env para falar com a API externa da InfinitePay — sem override
      # vira self-loop e POST /links cai aqui mesmo (404).
      INFINITEPAY_BASE_URL: https://api.checkout.infinitepay.io
      WORKER_POLL_SECONDS: "5"
      RUN_INLINE_WORKER: "true"
      AI_FEATURES_ENABLED: "true"
      AI_MODEL: deepseek-v4-pro
      AI_PRO_MODEL: deepseek-v4-pro
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infinitepay.rule=Host(`api.m33.live`) && PathPrefix(`/infinitepay`)"
      - "traefik.http.routers.infinitepay.entrypoints=web"
      - "traefik.http.services.infinitepay.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.infinitepay-strip.stripprefix.prefixes=/infinitepay"
      - "traefik.http.routers.infinitepay.middlewares=infinitepay-strip"

  jwt:
    build:
      context: ./jwt
    ports:
      - "8013:8000"
    env_file: .env                       # ← JWT_ALGORITHM, JWT_ISSUER, expirações
    environment:
      <<: [*common-env, *postgres-url]
      DATABASE_SCHEMA: jwt
      JWT_PRIVATE_KEY_FILE: private.pem
      JWT_PUBLIC_KEY_FILE: public.pem
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jwt.rule=Host(`api.m33.live`) && PathPrefix(`/jwt`)"
      - "traefik.http.routers.jwt.entrypoints=web"
      - "traefik.http.services.jwt.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.jwt-strip.stripprefix.prefixes=/jwt"
