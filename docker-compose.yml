      - "traefik.http.routers.lead.entrypoints=web"
      - "traefik.http.services.lead.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.lead-strip.stripprefix.prefixes=/lead"
      - "traefik.http.routers.lead.middlewares=lead-strip"

  notify:
    build:
      context: ./notify
    ports:
      - "8015:8000"
    env_file: .env                       # ← Mailcow SSH/SMTP/API + WhatsApp key + ElevenLabs
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
      DATABASE_SCHEMA: notify
      PROFILES_TIMEOUT_S: "5"
    volumes:
      # SSH key dedicada pra falar com Mailcow VM 150 (root@10.1.30.150).
      # authorized_keys da VM restringe a key a 'docker exec ... sendmail' — read-only.
      # Monta em /app/.ssh (home do appuser dentro do container) pra atravessar 700.
      - /home/maestri33/.notify-ssh:/app/.ssh:ro
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notify.rule=Host(`api.m33.live`) && PathPrefix(`/notify`)"
