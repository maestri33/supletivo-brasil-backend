# =============================================================================
# docker-compose.dev.yml — Ambiente de desenvolvimento completo
# =============================================================================
# Uso:
#   docker compose -f docker-compose.dev.yml up -d           # tudo
#   docker compose -f docker-compose.dev.yml up -d <servico> # um só
#   docker compose -f docker-compose.dev.yml ps               # status
#   docker compose -f docker-compose.dev.yml down             # derruba tudo
#
# Arquitetura de env (CONSOLIDADA — 2026-05-27):
#   • SECRETS (API keys, passwords)        → /backend/.env  via `env_file: .env`
#   • CONFIG estrutural (URLs, defaults)   → este compose, via YAML anchors
#   • DATABASE_SCHEMA por serviço          → inline em cada bloco environment:
#   • Cada .env per-módulo (lead/.env, ai/.env, …) é para E2E LOCAL fora do
#     compose (testes pytest com Postgres dedicado em porta alta). Aqui dentro
#     do compose NÃO são carregados — apenas .env (root) + environment: inline.
#
# Serviços: 22 microsserviços + postgres + redis + observabilidade
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# YAML anchors — vars estruturais que múltiplos serviços compartilham (DRY)
# ─────────────────────────────────────────────────────────────────────────────

# Defaults universais — ambiente, log, redis, timeouts, CORS
x-common-env: &common-env
  ENV: dev                            # Lido por jwt/notify/hub/fees/otp/enrollment (Literal["dev","staging","prod"]).
  ENVIRONMENT: development            # Alias usado por lead/staff/training/candidate/promoter (Environment enum).
  LOG_LEVEL: INFO                     # DEBUG|INFO|WARNING|ERROR.
  APP_VERSION: "0.3.0"                # Versão exposta em GET /health.
  REDIS_URL: redis://redis:6379/0     # Redis central (sem senha em dev).
  HTTP_TIMEOUT: "10"                  # Timeout default httpx (segundos) entre serviços.
  CORS_ORIGINS: '["*"]'               # CORS dev = aberto. Em prod, lista JSON específica.

# URL do Postgres central — formato async pra SQLAlchemy 2 / asyncpg
x-postgres-url: &postgres-url
  DATABASE_URL: postgresql+asyncpg://supletivo:supletivo_dev@postgres:5432/supletivo

# URLs internas entre serviços (DNS do docker network).
# Declaramos *_BASE_URL E *_SERVICE_URL porque alguns Settings usam um, outros o outro.
x-service-urls: &service-urls
  AUTH_BASE_URL: http://auth:8000
  AUTH_SERVICE_URL: http://auth:8000
  JWT_BASE_URL: http://jwt:8000
  JWT_SERVICE_URL: http://jwt:8000
  PROFILES_BASE_URL: http://profiles:8000
  PROFILES_SERVICE_URL: http://profiles:8000
  NOTIFY_BASE_URL: http://notify:8000
  NOTIFY_SERVICE_URL: http://notify:8000
  OTP_SERVICE_URL: http://otp:8000
  ROLES_BASE_URL: http://roles:8000
  ROLES_SERVICE_URL: http://roles:8000
  ADDRESS_SERVICE_URL: http://address:8000
  ADDRESSES_BASE_URL: http://address:8000
  DOCUMENTS_BASE_URL: http://documents:8000
  DOCUMENTS_SERVICE_URL: http://documents:8000
  AI_BASE_URL: http://ai:8000
  AI_SERVICE_URL: http://ai:8000
  ASAAS_BASE_URL: http://asaas:8000
  ASAAS_SERVICE_URL: http://asaas:8000
  INFINITEPAY_BASE_URL: http://infinitepay:8000
  INFINITEPAY_SERVICE_URL: http://infinitepay:8000
  LEAD_BASE_URL: http://lead:8000
  LEAD_SERVICE_URL: http://lead:8000
  CANDIDATE_SERVICE_URL: http://candidate:8000
  PROMOTER_SERVICE_URL: http://promoter:8000
  STUDENT_SERVICE_URL: http://student:8000
  TRAINING_SERVICE_URL: http://training:8000
  COMMISSIONS_BASE_URL: http://commissions:8000
  COMMISSIONS_SERVICE_URL: http://commissions:8000
  COORDINATOR_SERVICE_URL: http://coordinator:8000
  STAFF_SERVICE_URL: http://staff:8000
  ENROLLMENT_SERVICE_URL: http://enrollment:8000
  FEES_SERVICE_URL: http://fees:8000
  HUB_BASE_URL: http://hub:8000
  HUB_SERVICE_URL: http://hub:8000

# Healthcheck padrão p/ microsserviço (porta interna 8000, /health)
x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

# Dependência mínima — postgres + redis
x-deps-pg-redis: &deps-pg-redis
  postgres:
    condition: service_healthy
  redis:
    condition: service_started


services:

  # ── Infraestrutura compartilhada ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: supletivo
      POSTGRES_USER: supletivo
      POSTGRES_PASSWORD: supletivo_dev   # Dev only — em prod via Infisical.
    ports:
      - "5433:5432"                      # 5433 externo p/ evitar conflito com PG host.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supletivo -d supletivo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: maestri33@local.dev
      PGADMIN_DEFAULT_PASSWORD: "1993"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOGIN_BANNER: "'VPN-only access - authorized users only'"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgadmin4/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:80/misc/ping", "-O", "/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── API Gateway (Traefik) ──────────────────────────────────────────────────
  # http://localhost/<service>/...  |  Dashboard: http://localhost:8090/dashboard/
  # Portas 8001-8022 dos serviços seguem expostas pra acesso direto (dev only).

  traefik:
    # v2.11: Docker SDK do Traefik v3 negocia API 1.24, rejeitado por daemon >=25 (min 1.40).
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      # Caddy LXC (10.1.30.10) é edge — confia em X-Forwarded-* só dele.
      - "--entrypoints.web.forwardedHeaders.trustedIPs=10.1.30.10/32,127.0.0.1/32"
      - "--accesslog=true"
      - "--log.level=INFO"
      - "--ping=true"
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────────
  # Microsserviços (1 container por serviço, porta interna 8000)
  # Padrão:
  #   env_file: .env             ← injeta secrets do root .env
  #   environment: <<: anchors    ← injeta config compartilhada (URLs, defaults)
  #   environment.DATABASE_SCHEMA: <nome>  ← schema próprio no Postgres
  # ─────────────────────────────────────────────────────────────────────────

  address:
    build:
      context: ./address
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url]
      DATABASE_SCHEMA: address
      VIACEP_BASE_URL: https://viacep.com.br
      VIACEP_TIMEOUT_SECONDS: "5.0"
      UPLOAD_DIR: /app/uploads
    healthcheck: *healthcheck
    depends_on:
      <<: *deps-pg-redis
      auth:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.address.rule=Host(`api.m33.live`) && PathPrefix(`/address`)"
      - "traefik.http.routers.address.entrypoints=web"
      - "traefik.http.services.address.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.address-strip.stripprefix.prefixes=/address"
      - "traefik.http.routers.address.middlewares=address-strip"

  ai:
    build:
      context: ./ai
    ports:
      - "8002:8000"
    env_file: .env                       # ← DeepSeek/ElevenLabs/Gemini/GoogleVision keys
    environment:
      <<: [*common-env, *postgres-url]
      DATABASE_SCHEMA: ai
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`api.m33.live`) && PathPrefix(`/ai`)"
      - "traefik.http.routers.ai.entrypoints=web"
      - "traefik.http.services.ai.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.ai-strip.stripprefix.prefixes=/ai"
      - "traefik.http.routers.ai.middlewares=ai-strip"

  asaas:
    build:
      context: ./asaas
    ports:
      - "8003:8000"
    env_file: .env                       # ← ASAAS_API_KEY, ASAAS_WEBHOOK_SECRET, wallet, CIDRs
    environment:
      <<: [*common-env, *postgres-url]
      DATABASE_SCHEMA: asaas
      WEBHOOK_NAME: supletivo-asaas-dev
      URL_VERIFY_NONCE_TTL: "300"
      DEFAULT_SCHEDULED_HOUR: "9"
    healthcheck: *healthcheck
    depends_on: *deps-pg-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.asaas.rule=Host(`api.m33.live`) && PathPrefix(`/asaas`)"
      - "traefik.http.routers.asaas.entrypoints=web"
      - "traefik.http.services.asaas.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.asaas-strip.stripprefix.prefixes=/asaas"
      - "traefik.http.routers.asaas.middlewares=asaas-strip"

  auth:
    build:
      context: ./auth
    ports:
      - "8004:8000"
    env_file: .env
    environment:
      <<: [*common-env, *postgres-url, *service-urls]
